name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the installer (e.g. 0.1.0-test). Ignored on tag pushes."
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean whispeross.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\WhisperOSS\WhisperOSS.exe")) {
            Write-Error "PyInstaller did not produce dist\WhisperOSS\WhisperOSS.exe"
            exit 1
          }
          Get-ChildItem dist\WhisperOSS | Select-Object -First 5

      - name: Compile installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Error "Inno Setup 6 not found on runner"
            exit 1
          }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" "installer\whispeross.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperOSS-Setup-${{ steps.ver.outputs.version }}
          path: installer/Output/WhisperOSS-Setup-*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: steps.ver.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/WhisperOSS-Setup-*.exe
          generate_release_notes: true
